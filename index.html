<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <title>Cronômetro</title>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
  </div>
  <div class="container">
    <div class="info">
      <div id="timer">00:00:00</div>
      <div id="status">Clique em "Iniciar" para começar</div>
      <div class="progress-bar-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>
    <div class="controls">
      <button id="startBtn">Iniciar</button>
      <button id="pauseBtn">Pausar</button>
      <button id="stopBtn">Parar</button>
      <button id="resetBtn">Zerar</button>
    </div>
  </div>

  <div class="author-info" style="display: block;">
    <p>Site feito por <a href="https://thalesjuan.netlify.app" target="_blank">Thales Juan</a>></p>
  </div>

  <script src="assets/js/script.js"></script>
</body>
</html>
